      - paragraph [ref=f2e109]
      - paragraph [ref=f2e110]: ด้วยกองนโยบายและแผน มีความประสงค์จะขอความเห็นชอบในเรื่องการจัดทำแผนปฏิบัติงานประจำปีงบประมาณ พ.ศ. 2567 ซึ่งได้ดำเนินการจัดทำขึ้นตามพระราชกฤษฎีกาว่าด้วยหลักเกณฑ์และวิธีการบริหารกิจการบ้านเมืองที่ดี อาศัยอำนาจตามความในมาตรา ๓๓ แห่งพระราชบัญญัติระเบียบบริหารราชการแผ่นดิน พ.ศ. ๒๕๓๔ จึงเรียนมาเพื่อโปรดพิจารณา
